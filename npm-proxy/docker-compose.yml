networks:
  web-proxy:
    external: true

services:
  npm_server:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm_server
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - web-proxy
